<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Recipe Finder App</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <h1>Recipe Finder</h1>
            <p>Search for delicious meals and recipes</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">

            <input
                type="text"
                id="search-input"
                placeholder="Search for a meal..."
            />

            <button id="search-button">
                Search
            </button>

        </section>

        <!-- Recipe Results -->
        <main id="recipe-container">
        <div class="welcome-message">

            <h2>Find Your Next Favorite Meal</h2>

            <p>
                Search for recipes and explore delicious meals from around the world.
            </p>

        </div>
        </main>

        <!-- Recipe Modal -->

<div class="recipe-modal" id="recipe-modal">

    <div class="modal-content">

        <button class="close-btn" id="close-btn">
            X
        </button>

        <div id="modal-body">

            <!-- Dynamic modal content -->

        </div>

    </div>

    </div>
    </div>

    <footer class="footer">

    <p>
        Built with HTML, CSS, and JavaScript using TheMealDB API
    </p>

    </footer>
    <script src="script.js"></script>

</body>
</html>
