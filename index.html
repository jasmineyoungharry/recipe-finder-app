<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Recipe Finder App</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main App Container -->
    <div class="container">

        <!-- App Title -->
        <header>
            <h1>Recipe Finder</h1>
            <p>Search for delicious meals and recipes</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">

            <input 
                type="text" 
                id="search-input" 
                placeholder="Search for a meal..."
            >

            <button id="search-btn">
                Search
            </button>

        </section>

        <!-- Recipe Results -->
        <section id="recipe-container">

            <!-- Recipes will appear here -->

        </section>

    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
